extend type Mutation {
    login(input: LoginInput! @spread): LoginResponse! @field(resolver: "App\\GraphQL\\Mutations\\AuthMutation@login")
    register(input: RegisterInput! @spread): LoginResponse! @field(resolver: "App\\GraphQL\\Mutations\\AuthMutation@register")
    logout: LogoutResponse! @field(resolver: "App\\GraphQL\\Mutations\\AuthMutation@logout")
}

extend type Query {
    me: AuthUser @field(resolver: "App\\GraphQL\\Mutations\\AuthMutation@me") @guard
}

type AuthUser {
    id: ID!
    username: String!
    first_name: String!
    last_name: String!
    email: String!
    role: String
}

input LoginInput {
    username: String!
    password: String!
}

input RegisterInput {
    username: String!
    first_name: String!
    last_name: String!
    email: String!
    password: String!
}

type LoginResponse {
    status: String!
    message: String!
    token: String
    user: AuthUser
}

type LogoutResponse {
    status: String!
    message: String!
}
