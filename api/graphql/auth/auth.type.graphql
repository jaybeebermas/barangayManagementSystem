type AuthUser {
  id: ID!
  username: String!
  first_name: String!
  last_name: String!
  email: String!
  role: String
  permissions: [String!]! @rename(attribute: "permissions_list")
}

type LoginResponse {
  status: String!
  message: String!
  token: String
  user: AuthUser
}

type LogoutResponse {
  status: String!
  message: String!
}
