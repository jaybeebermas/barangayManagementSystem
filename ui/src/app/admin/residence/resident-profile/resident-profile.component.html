<div class="flex h-[calc(100vh-4rem)] -m-4 md:-m-6 lg:-m-8 overflow-hidden bg-zinc-100">
  <div class="flex-1 overflow-y-auto p-6 md:p-8">
    <div class="min-h-full bg-transparent -m-4 md:-m-6 lg:-m-8 p-4 md:p-8 overflow-y-auto">
      <div class="w-full bg-white rounded-3xl border border-zinc-200/50 p-6 md:p-10 shadow-sm flex flex-col gap-6 min-h-[calc(100vh-10rem)]">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-6 p-1">
          <div>
            <h2 class="text-2xl font-black text-zinc-900 tracking-tight">Resident Profile</h2>
            <p class="text-zinc-500 font-medium mt-1 text-sm">Manage resident records, zones, and profile status.</p>
          </div>
          <button
            type="button"
            class="btn-primary !py-2.5 !px-6 !text-xs shadow-lg shadow-primary-600/10 whitespace-nowrap"
          >
            Add Resident
          </button>
        </div>

        <div class="flex flex-col md:flex-row gap-4 p-1 items-center">
          <div class="relative flex-1 w-full">
            <ng-icon
              name="heroMagnifyingGlass"
              class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400 text-xl"
            ></ng-icon>
            <input
              type="text"
              placeholder="Search by resident name..."
              class="w-full h-14 rounded-xl border border-zinc-300/80 bg-white pl-12 pr-4 text-sm text-zinc-700 outline-none focus:border-primary-400"
            />
          </div>
          <div class="flex gap-3 w-full md:w-auto items-center">
            <select
              class="h-14 min-w-[160px] rounded-xl border border-zinc-300/80 bg-white px-4 text-sm text-zinc-700 outline-none focus:border-primary-400"
            >
              <option>All Zones</option>
            </select>
            <select
              class="h-14 min-w-[160px] rounded-xl border border-zinc-300/80 bg-white px-4 text-sm text-zinc-700 outline-none focus:border-primary-400"
            >
              <option>All Status</option>
            </select>
          </div>
        </div>

        <div class="flex-1 flex flex-col min-h-0">
          <div class="hidden md:block overflow-x-auto flex-1">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr>
                  <th class="px-8 py-4 text-[10px] font-bold text-zinc-400 uppercase tracking-widest bg-zinc-100/50 border-b border-zinc-200/60">Name</th>
                  <th class="px-8 py-4 text-[10px] font-bold text-zinc-400 uppercase tracking-widest bg-zinc-100/50 border-b border-zinc-200/60">Zone</th>
                  <th class="px-8 py-4 text-[10px] font-bold text-zinc-400 uppercase tracking-widest bg-zinc-100/50 border-b border-zinc-200/60 text-center">Status</th>
                  <th class="px-8 py-4 text-[10px] font-bold text-zinc-400 uppercase tracking-widest bg-zinc-100/50 border-b border-zinc-200/60 text-right">Action</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-zinc-100/50">
                <tr class="hover:bg-zinc-100/30 transition-all group">
                  <td class="px-8 py-4">
                    <span class="block text-sm font-bold text-zinc-900 leading-none">Juan Dela Cruz</span>
                  </td>
                  <td class="px-8 py-4 text-xs font-medium text-zinc-500">Zone 1</td>
                  <td class="px-8 py-4 text-center">
                    <span class="inline-flex px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest bg-emerald-100 text-emerald-700">
                      Active
                    </span>
                  </td>
                  <td class="px-8 py-4 text-right whitespace-nowrap">
                    <button
                      type="button"
                      class="flex items-center justify-center w-8 h-8 rounded-full text-primary-600 hover:bg-primary-50 transition-colors ml-auto"
                    >
                      <ng-icon name="heroEye" class="text-[17px]"></ng-icon>
                    </button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="bg-zinc-50/50 border-t border-zinc-100 rounded-b-2xl px-6">
            <div class="flex items-center justify-between min-h-[48px] py-2 text-[11px] text-zinc-500 font-medium">
              <div class="flex items-center gap-2">
                <span>Items per page:</span>
                <select class="h-8 rounded-md border border-zinc-200 bg-white px-2 text-[11px] text-zinc-600 outline-none">
                  <option>5</option>
                  <option selected>10</option>
                  <option>25</option>
                  <option>100</option>
                </select>
              </div>
              <div class="flex items-center gap-2">
                <span>1-1 of 1</span>
                <button type="button" class="w-8 h-8 rounded-full border border-zinc-200 text-zinc-400 cursor-not-allowed" disabled>
                  ‹
                </button>
                <button type="button" class="w-8 h-8 rounded-full border border-zinc-200 text-zinc-400 cursor-not-allowed" disabled>
                  ›
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
