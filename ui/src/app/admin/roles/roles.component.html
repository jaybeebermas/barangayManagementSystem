<div class="flex h-[calc(100vh-4rem)] -m-4 md:-m-6 lg:-m-8 overflow-hidden bg-zinc-100">
  
  <!-- Left Side: Role List Container -->
  <div class="w-80 bg-white border-r border-zinc-200/60 flex flex-col h-[calc(100vh-4rem)] shadow-sm z-10 shrink-0">
    <div class="p-6 border-b border-zinc-100 bg-white/50 backdrop-blur sticky top-0 flex flex-col gap-4">
      <div class="flex items-center gap-2 text-sm font-medium text-zinc-500">
        <span class="hover:text-zinc-800 cursor-pointer transition-colors">User Management</span>
        <ng-icon name="heroChevronRight" class="h-4 w-4 text-zinc-400"></ng-icon>
        <span class="text-primary-600 font-bold">Roles</span>
      </div>
      <div>
        <h2 class="text-lg font-black text-zinc-900 tracking-tight mb-1">System Roles</h2>
        <p class="text-xs text-zinc-500 font-medium mb-4">Manage access levels and permissions</p>
        <button class="w-full btn-primary !py-2.5 !text-sm shadow-lg shadow-primary-600/10">
          <span class="flex items-center justify-center gap-2">
            <ng-icon name="heroPlus" class="h-4 w-4" strokeWidth="3"></ng-icon>
            Create New Role
          </span>
        </button>
      </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 space-y-2">
      <button 
        *ngFor="let role of roles()"
        matRipple
        (click)="selectRole(role)"
        class="w-full text-left p-4 rounded-2xl transition-all duration-200 border border-transparent"
        [ngClass]="selectedRole()?.id === role.id ? 'bg-primary-50 border-primary-100 shadow-sm' : 'hover:bg-zinc-50 active:bg-zinc-100 hover:border-zinc-200/50'">
        <div class="flex items-center justify-between mb-2">
          <h3 class="text-sm font-bold leading-none tracking-tight" 
              [ngClass]="selectedRole()?.id === role.id ? 'text-primary-900' : 'text-zinc-900'">
            {{ role.name }}
          </h3>
          <span class="inline-flex items-center justify-center bg-white border border-zinc-200 text-zinc-500 text-[10px] font-black rounded-full px-2 py-0.5">
            {{ role.usersCount }} Users
          </span>
        </div>
        <p class="text-xs font-medium leading-relaxed line-clamp-2"
           [ngClass]="selectedRole()?.id === role.id ? 'text-primary-700/80' : 'text-zinc-500'">
          {{ role.description }}
        </p>
      </button>
    </div>
    
    <div class="bg-white border-t border-zinc-100 mt-auto">
      <app-table-pagination 
        [currentPage]="1" 
        [totalItems]="roles().length" 
        [pageSize]="5">
      </app-table-pagination>
    </div>
  </div>

  <!-- Right Side: Details Container -->
  <div class="flex-1 h-full overflow-y-auto p-6 md:p-8">
    <app-user-management-layout *ngIf="selectedRole() as role">
      <app-page-header 
        [title]="role.name" 
        subtitle="Manage permissions and assign users to this role"
        actionLabel="Edit Details"
        customIcon='<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" /></svg>'>
      </app-page-header>

      <div class="mt-8 border-t border-zinc-100 pt-8">
        <h3 class="text-sm font-bold text-zinc-900 mb-6">Configured Permissions</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Mock Permission Blocks -->
          <div class="bg-zinc-50/50 p-5 rounded-2xl border border-zinc-200/60">
            <div class="flex items-center gap-3 mb-3">
              <div class="h-8 w-8 rounded-lg bg-white shadow-sm flex items-center justify-center text-zinc-400">
                <ng-icon name="heroUsers" class="h-4 w-4"></ng-icon>
              </div>
              <h4 class="text-xs font-bold text-zinc-900 uppercase tracking-widest">User Management</h4>
            </div>
            <div class="space-y-2">
              <label class="flex items-center gap-3">
                <input type="checkbox" checked disabled class="h-4 w-4 rounded text-primary-600 bg-zinc-100 border-zinc-300 focus:ring-primary-500 focus:ring-2">
                <span class="text-sm font-medium text-zinc-700">View Users</span>
              </label>
              <label class="flex items-center gap-3">
                <input type="checkbox" checked disabled class="h-4 w-4 rounded text-primary-600 bg-zinc-100 border-zinc-300 focus:ring-primary-500 focus:ring-2">
                <span class="text-sm font-medium text-zinc-700">Manage Users</span>
              </label>
            </div>
          </div>
          
          <div class="bg-zinc-50/50 p-5 rounded-2xl border border-zinc-200/60">
            <div class="flex items-center gap-3 mb-3">
              <div class="h-8 w-8 rounded-lg bg-white shadow-sm flex items-center justify-center text-zinc-400">
                <ng-icon name="heroShieldCheck" class="h-4 w-4"></ng-icon>
              </div>
              <h4 class="text-xs font-bold text-zinc-900 uppercase tracking-widest">System Settings</h4>
            </div>
            <div class="space-y-2">
              <label class="flex items-center gap-3">
                <input type="checkbox" [checked]="role.name === 'Super Administrator'" disabled class="h-4 w-4 rounded text-primary-600 bg-zinc-100 border-zinc-300 focus:ring-primary-500 focus:ring-2">
                <span class="text-sm font-medium text-zinc-700">Access Global Settings</span>
              </label>
              <label class="flex items-center gap-3">
                <input type="checkbox" [checked]="role.name === 'Super Administrator'" disabled class="h-4 w-4 rounded text-primary-600 bg-zinc-100 border-zinc-300 focus:ring-primary-500 focus:ring-2">
                <span class="text-sm font-medium text-zinc-700">Manage System Backups</span>
              </label>
            </div>
          </div>
        </div>
      </div>
    </app-user-management-layout>
  </div>
</div>
