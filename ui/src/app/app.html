<ng-container *ngIf="authService.isAuthenticated() && isSubRoute('/admin'); else authFlow">
  <app-admin-layout 
    [sidebarOpen]="sidebarOpen()" 
    [navItems]="navigation()"
    (toggleSidebar)="toggleSidebar()">
    <router-outlet></router-outlet>
  </app-admin-layout>
</ng-container>

<ng-template #authFlow>
  <div class="animate-fade-in-up">
    <router-outlet></router-outlet>
  </div>
</ng-template>

<!-- Global Toaster -->
<div *ngIf="toastService.toast() as t"
     class="fixed top-6 right-6 z-[300] p-4 pr-6 rounded-md shadow-2xl text-white min-w-[320px] max-w-[420px] flex items-start gap-4 animate-in slide-in-from-right-8 duration-300 ease-out"
     [ngClass]="t.type === 'success' ? 'bg-[#4CAF50]' : (t.type === 'error' ? 'bg-[#F44336]' : 'bg-[#2196F3]')"
     style="font-family: 'Google Sans', var(--font-sans);">
  
  <div class="flex-shrink-0 mt-0.5">
    <ng-icon [name]="t.type === 'success' ? 'heroCheck' : (t.type === 'error' ? 'heroExclamationTriangle' : 'heroInformationCircle')" 
             class="h-7 w-7 stroke-[3px]"></ng-icon>
  </div>

  <div class="flex flex-col flex-grow gap-0.5">
    <h3 class="font-bold text-[15px] leading-tight tracking-wide">
      {{ t.title || (t.type === 'success' ? 'Success' : (t.type === 'error' ? 'Error' : 'Information')) }}
    </h3>
    <p class="text-[14px] leading-snug opacity-95 font-medium">
      {{ t.message }}
    </p>
  </div>

  <button (click)="toastService.toast.set(null)" 
          class="flex-shrink-0 -mr-2 -mt-1 opacity-50 hover:opacity-100 transition-opacity p-1">
    <ng-icon name="heroXMark" class="h-4 w-4"></ng-icon>
  </button>
</div>

<!-- Global Modal Instance -->
<app-modal
  [isOpen]="modalService.isOpen()"
  [title]="modalService.options().title"
  [subtitle]="modalService.options().subtitle || ''"
  [maxWidth]="modalService.options().maxWidth || 'max-w-2xl'"
  [confirmLabel]="modalService.options().confirmLabel || 'Confirm'"
  [cancelLabel]="modalService.options().cancelLabel || 'Cancel'"
  [showFooter]="modalService.options().showFooter !== false"
  [isLoading]="modalService.isLoading()"
  [isConfirmDisabled]="modalService.isConfirmDisabled()"
  (close)="modalService.close()"
  (confirm)="modalService.onConfirm()">
  
  <ng-container *ngTemplateOutlet="modalService.content()"></ng-container>
</app-modal>
