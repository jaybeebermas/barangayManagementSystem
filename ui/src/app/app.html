<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">Barangay Management</div>
    <p *ngIf="loadingNavigation()" class="sidebar-state">Loading navigation...</p>
    <p *ngIf="navigationError()" class="sidebar-state error">{{ navigationError() }}</p>

    <nav *ngIf="!loadingNavigation() && !navigationError()">
      <ul class="sidebar-list">
        <li *ngFor="let section of navigation()" class="sidebar-section">
          <p class="section-label">{{ section.title }}</p>
          <ul class="section-items">
            <li *ngFor="let item of section.children">
              <a
                *ngIf="item.route"
                [routerLink]="item.route"
                routerLinkActive="active-link"
                class="sidebar-link"
              >
                {{ item.title }}
              </a>
              <details *ngIf="!item.route && item.children.length" class="sidebar-collapsible" open>
                <summary>{{ item.title }}</summary>
                <ul>
                  <li *ngFor="let child of item.children">
                    <a
                      *ngIf="child.route"
                      [routerLink]="child.route"
                      routerLinkActive="active-link"
                      class="sidebar-link child-link"
                    >
                      {{ child.title }}
                    </a>
                  </li>
                </ul>
              </details>
            </li>
          </ul>
        </li>
      </ul>
    </nav>
  </aside>

  <main class="page-content">
    <router-outlet></router-outlet>
  </main>
</div>
