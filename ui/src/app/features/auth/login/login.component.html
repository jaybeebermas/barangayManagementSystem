<div class="antigravity-container">
  <canvas #particleCanvas class="particle-canvas"></canvas>


  <div class="foreground-content w-full min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-8">
  <div class="w-full max-w-md">
    <!-- Card Container -->
    <div
      class="bg-white border border-zinc-200 rounded-2xl shadow-xl overflow-hidden animate-in fade-in zoom-in duration-500 floating-card">
      <div class="p-8 sm:p-10">
        <!-- Header -->
        <div class="text-center mb-10">
          <h1 class="text-3xl font-bold text-zinc-900 tracking-tight mb-2">Barangay System</h1>
          <p class="text-zinc-500 text-sm">Secure Portal for Administrators</p>
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage()"
          class="mb-6 p-4 bg-red-50 border border-red-200 rounded-xl animate-in slide-in-from-top-4 duration-300">
          <p class="text-xs text-red-600 font-medium text-center">{{ errorMessage() }}</p>
        </div>

        <!-- Form -->
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
          <!-- Username Field -->
          <div>
            <label for="username"
              class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 ml-1">Username</label>
            <div class="relative">
              <input id="username" type="text" formControlName="username"
                class="block w-full px-4 py-3 bg-zinc-100/50 border border-zinc-200 rounded-xl text-zinc-900 text-sm focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all placeholder-zinc-400 outline-none" />
            </div>
            <div *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid" class="mt-2 ml-1">
              <p class="text-[10px] text-red-500 font-medium italic">Username is required.</p>
            </div>
          </div>

          <!-- Password Field -->
          <div>
            <label for="password"
              class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 ml-1">Password</label>
            <div class="relative">
              <input id="password" [type]="showPassword() ? 'text' : 'password'" formControlName="password"
                class="block w-full px-4 py-3 bg-zinc-100/50 border border-zinc-200 rounded-xl text-zinc-900 text-sm focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all placeholder-zinc-400 outline-none" />
              <button type="button" (click)="togglePassword()"
                class="absolute right-3 top-1/2 -translate-y-1/2 p-1.5 text-zinc-500 hover:text-zinc-300 transition-colors"
                aria-label="Toggle password visibility">
                <ng-icon *ngIf="!showPassword()" name="heroEye" class="text-lg"></ng-icon>
                <ng-icon *ngIf="showPassword()" name="heroEyeSlash" class="text-lg"></ng-icon>
              </button>
            </div>
            <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="mt-2 ml-1">
              <p class="text-[10px] text-red-500 font-medium italic">Password must be at least 8 characters.</p>
            </div>
          </div>

          <!-- Options -->
          <div class="flex items-center justify-between ml-1">
            <label class="flex items-center space-x-2 cursor-pointer group">
              <input type="checkbox" formControlName="rememberMe"
                class="w-4 h-4 rounded border-zinc-200 bg-zinc-100 text-blue-600 focus:ring-blue-500/50 transition-colors" />
              <span
                class="text-[10px] font-semibold text-zinc-400 uppercase tracking-widest group-hover:text-zinc-500 transition-colors">Remember
                me</span>
            </label>
            <a href="#"
              class="text-[10px] font-semibold text-blue-500 uppercase tracking-widest hover:text-blue-600 transition-colors">Forgot?</a>
          </div>

          <!-- Submit Button -->
          <button type="submit" [disabled]="isLoading() || loginForm.invalid"
            class="group relative w-full overflow-hidden rounded-xl bg-blue-600 px-6 py-3.5 text-sm font-bold text-white shadow-lg shadow-blue-500/10 hover:bg-blue-700 active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed">
            <div class="flex items-center justify-center gap-2">
              <span *ngIf="!isLoading()">Sign In</span>
              <span *ngIf="isLoading()" class="flex items-center gap-2">
                <svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none">
                  </circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                Processing...
              </span>
            </div>
          </button>
        </form>

      </div>
    </div>
  </div>
</div>
</div>
