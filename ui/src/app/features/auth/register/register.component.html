<div class="min-h-screen flex items-center justify-center bg-zinc-50 p-4 sm:p-6 lg:p-8">
  <div class="w-full max-w-lg">
    <!-- Card Container -->
    <div
      class="bg-white border border-zinc-200 rounded-2xl shadow-xl overflow-hidden animate-in fade-in zoom-in duration-500">
      <div class="p-8 sm:p-10">
        <!-- Header -->
        <div class="text-center mb-8">
          <h1 class="text-3xl font-bold text-zinc-900 tracking-tight mb-2">Create Account</h1>
          <p class="text-zinc-500 text-sm">Join the Barangay Management System</p>
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage()" class="mb-6 p-4 bg-red-50 border border-red-200 rounded-xl">
          <p class="text-xs text-red-600 font-medium text-center">{{ errorMessage() }}</p>
        </div>

        <!-- Form -->
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <!-- First Name -->
            <div>
              <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 ml-1">First
                Name</label>
              <input type="text" formControlName="first_name"
                class="block w-full px-4 py-3 bg-zinc-100/50 border border-zinc-200 rounded-xl text-zinc-900 text-sm focus:ring-2 focus:ring-blue-500/50 outline-none"
                placeholder="John" />
            </div>
            <!-- Last Name -->
            <div>
              <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 ml-1">Last
                Name</label>
              <input type="text" formControlName="last_name"
                class="block w-full px-4 py-3 bg-zinc-100/50 border border-zinc-200 rounded-xl text-zinc-900 text-sm focus:ring-2 focus:ring-blue-500/50 outline-none"
                placeholder="Doe" />
            </div>
          </div>

          <!-- Username -->
          <div>
            <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 ml-1">Username</label>
            <input type="text" formControlName="username"
              class="block w-full px-4 py-3 bg-zinc-100/50 border border-zinc-200 rounded-xl text-zinc-900 text-sm focus:ring-2 focus:ring-blue-500/50 outline-none"
              placeholder="johndoe" />
          </div>

          <!-- Email -->
          <div>
            <label class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 ml-1">Email
              Address</label>
            <input type="email" formControlName="email"
              class="block w-full px-4 py-3 bg-zinc-100/50 border border-zinc-200 rounded-xl text-zinc-900 text-sm focus:ring-2 focus:ring-blue-500/50 outline-none"
              placeholder="john@example.com" />
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <!-- Password -->
            <div>
              <label
                class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 ml-1">Password</label>
              <input type="password" formControlName="password"
                class="block w-full px-4 py-3 bg-zinc-100/50 border border-zinc-200 rounded-xl text-zinc-900 text-sm focus:ring-2 focus:ring-blue-500/50 outline-none"
                placeholder="••••••••" />
            </div>
            <!-- Confirm Password -->
            <div>
              <label
                class="block text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2 ml-1">Confirm</label>
              <input type="password" formControlName="confirmPassword"
                class="block w-full px-4 py-3 bg-zinc-100/50 border border-zinc-200 rounded-xl text-zinc-900 text-sm focus:ring-2 focus:ring-blue-500/50 outline-none"
                placeholder="••••••••" />
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" [disabled]="isLoading() || registerForm.invalid"
            class="w-full rounded-xl bg-blue-600 px-6 py-3.5 text-sm font-bold text-white shadow-lg hover:bg-blue-700 active:scale-[0.98] transition-all disabled:opacity-50 mt-4">
            <span *ngIf="!isLoading()">Register Account</span>
            <span *ngIf="isLoading()">Creating account...</span>
          </button>
        </form>

        <div class="mt-8 text-center">
          <p class="text-xs text-zinc-500">
            Already have an account?
            <a routerLink="/login" class="text-blue-500 font-semibold hover:text-blue-600 transition-colors">Sign In</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
