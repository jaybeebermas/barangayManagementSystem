<div class="flex flex-col items-center justify-center text-center py-6">
  <!-- Pulsing warning trash icon -->
  <div class="inline-flex items-center justify-center p-5 bg-red-50 text-red-500 rounded-3xl mb-5 shadow-sm border border-red-100/50">
    <ng-icon name="heroTrash" class="h-10 w-10 animate-pulse" strokeWidth="2.5"></ng-icon>
  </div>
  
  <p class="text-zinc-500 font-medium text-base leading-relaxed max-w-md">
    Are you sure you want to delete <span class="font-bold text-zinc-900 bg-zinc-100 px-2 py-1 rounded-md">{{ name }}</span>?
  </p>
  <p class="text-xs font-semibold text-zinc-400 mt-2 uppercase tracking-wider">
    This action is permanent and cannot be undone
  </p>
</div>
